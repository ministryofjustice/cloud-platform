name: code-formatter

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

# permissions:
#   contents: write
#   security-events: write # needed for SARIF upload

jobs:
  format-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: ministryofjustice/modernisation-platform-github-actions/format-code@5b44b387694dfa249cfa2dcf289ca871abe9e3e2 #v5.0.1

